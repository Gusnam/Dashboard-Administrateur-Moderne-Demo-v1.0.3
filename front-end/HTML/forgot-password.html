<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mot de passe oublié - AdminDash</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/components.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script>
        // Check if already logged in
        if (localStorage.getItem('dashboard-session')) {
            window.location.href = 'index.html';
        }
        
        // Apply dark mode before page renders
        function initializeDarkMode() {
            if (localStorage.getItem('dashboard-dark-mode') === 'true') {
                document.documentElement.setAttribute('data-dark', 'true');
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }
        
        // Theme system preference
        function initializeSystemTheme() {
            const savedTheme = localStorage.getItem('dashboard-theme');
            if (savedTheme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    document.documentElement.setAttribute('data-dark', 'true');
                    document.body.classList.add('dark');
                    localStorage.setItem('dashboard-dark-mode', 'true');
                }
            }
        }
        
        // Execute initialization
        initializeDarkMode();
        initializeSystemTheme();
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">AdminDash</h1>
                <p class="auth-subtitle">Récupérez votre accès</p>
            </div>

            <div id="emailStep">
                <form id="resetForm" class="auth-form">
                    <p class="auth-description">
                        Entrez votre email pour recevoir les instructions de réinitialisation.
                    </p>

                    <div class="auth-form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="votre@email.com"
                            required
                        />
                        <span class="form-error" id="emailError"></span>
                    </div>

                    <button type="submit" class="btn btn--primary auth-btn">Envoyer les instructions</button>
                    <span class="form-error" id="generalError"></span>
                </form>
            </div>

            <div id="successStep" style="display: none;">
                <div class="auth-success">
                    <div class="success-icon">✓</div>
                    <h2>Email envoyé!</h2>
                    <p>Vérifiez votre boîte mail pour les instructions de réinitialisation.</p>
                    <p class="help-text">N'oubliez pas de vérifier votre dossier de spam.</p>
                </div>
            </div>

            <div class="auth-footer">
                <p><a href="signin.html" class="auth-link">Retour à la connexion</a></p>
            </div>
        </div>

        <div class="auth-background">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const generalError = document.getElementById('generalError');
        const emailStep = document.getElementById('emailStep');
        const successStep = document.getElementById('successStep');

        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            emailError.textContent = '';
            generalError.textContent = '';

            const email = emailInput.value.trim();

            if (!email) {
                emailError.textContent = 'L\'email est requis';
                return;
            }

            if (!isValidEmail(email)) {
                emailError.textContent = 'Email invalide';
                return;
            }

            // Check if user exists
            const users = JSON.parse(localStorage.getItem('dashboard-users') || '[]');
            const userExists = users.find(u => u.email === email);

            if (!userExists) {
                // For security, don't reveal if email exists
                generalError.textContent = 'Si cet email existe, les instructions ont été envoyées';
                return;
            }

            // Simulate sending reset email (in production, this would call a backend)
            const resetToken = 'reset_' + Date.now();
            localStorage.setItem('dashboard-reset-token-' + email, JSON.stringify({
                token: resetToken,
                createdAt: new Date().toISOString(),
                expiresIn: 3600000 // 1 hour
            }));

            // Show success message
            emailStep.style.display = 'none';
            successStep.style.display = 'block';
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
    </script>
</body>
</html>
