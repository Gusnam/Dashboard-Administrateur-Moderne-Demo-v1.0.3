<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Se connecter - AdminDash</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/components.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script>
        // Check if already logged in
        if (localStorage.getItem('dashboard-session')) {
            window.location.href = 'index.html';
        }
        
        function initializeTheme() {
            const savedTheme = localStorage.getItem('dashboard-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const darkModeStored = localStorage.getItem('dashboard-dark-mode') === 'true';
            const useDark = savedTheme === 'dark'
                || (savedTheme === 'system' && prefersDark)
                || (!savedTheme && darkModeStored)
                || (savedTheme !== 'light' && savedTheme !== 'system' && darkModeStored);

            if (useDark) {
                document.documentElement.setAttribute('data-dark', 'true');
                document.body.classList.add('dark');
                localStorage.setItem('dashboard-dark-mode', 'true');
            } else {
                document.documentElement.removeAttribute('data-dark');
                document.body.classList.remove('dark');
                localStorage.setItem('dashboard-dark-mode', 'false');
            }
        }

        // Execute initialization
        initializeTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', initializeTheme);
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">AdminDash</h1>
                <p class="auth-subtitle">Connectez-vous à votre compte</p>
            </div>

            <form id="signInForm" class="auth-form">
                <div class="auth-form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="votre@email.com"
                        required
                    />
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="auth-form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        />
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="passwordToggle"
                            aria-label="Afficher/Masquer le mot de passe"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="auth-form-options">
                    <div class="checkbox-wrapper">
                        <input 
                            type="checkbox" 
                            id="rememberMe" 
                            name="rememberMe"
                        />
                        <label for="rememberMe">Se souvenir de moi</label>
                    </div>
                    <a href="forgot-password.html" class="auth-link-small">Mot de passe oublié?</a>
                </div>

                <button type="submit" class="btn btn--primary auth-btn">Se connecter</button>

                <span class="form-error" id="generalError"></span>
            </form>

            <div class="auth-footer">
                <p>Pas encore de compte? <a href="signup.html" class="auth-link">S'inscrire</a></p>
            </div>
        </div>

        <div class="auth-background">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>
    </div>

    <script src="../SCRIPTS/auth.js"></script>
    <script>
        // Sign In Form Handler
        const signInForm = document.getElementById('signInForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const rememberMe = document.getElementById('rememberMe');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const generalError = document.getElementById('generalError');

        // Password visibility toggle
        passwordToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            passwordToggle.classList.toggle('active');
        });

        // Handle sign in form submit
        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            emailError.textContent = '';
            passwordError.textContent = '';
            generalError.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            let isValid = true;

            if (!email) {
                emailError.textContent = 'L\'email est requis';
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailError.textContent = 'Email invalide';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Le mot de passe est requis';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                isValid = false;
            }

            if (!isValid) return;

            try {
                const user = await auth.authLogin(email, password);
                auth.saveSession(user);

                if (rememberMe.checked) {
                    localStorage.setItem('dashboard-remember-email', email);
                } else {
                    localStorage.removeItem('dashboard-remember-email');
                }

                window.location.href = 'index.html';
            } catch (error) {
                generalError.textContent = error.message || 'Email ou mot de passe incorrect';
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const rememberedEmail = localStorage.getItem('dashboard-remember-email');
            if (rememberedEmail) {
                emailInput.value = rememberedEmail;
                rememberMe.checked = true;
            }
        });
    </script>
</body>
</html>
