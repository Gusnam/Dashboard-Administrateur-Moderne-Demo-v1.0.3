<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S'inscrire - AdminDash</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/components.css" />
    <link rel="stylesheet" href="../CSS/auth.css" />
    <script src="../SCRIPTS/auth.js"></script>
    <script src="../SCRIPTS/page-protection.js"></script>
    <script>
        function initializeTheme() {
            const savedTheme = localStorage.getItem('dashboard-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const darkModeStored = localStorage.getItem('dashboard-dark-mode') === 'true';
            const useDark = savedTheme === 'dark'
                || (savedTheme === 'system' && prefersDark)
                || (!savedTheme && darkModeStored)
                || (savedTheme !== 'light' && savedTheme !== 'system' && darkModeStored);

            if (useDark) {
                document.documentElement.setAttribute('data-dark', 'true');
                localStorage.setItem('dashboard-dark-mode', 'true');
            } else {
                document.documentElement.removeAttribute('data-dark');
                localStorage.setItem('dashboard-dark-mode', 'false');
            }

            if (document.body) {
                document.body.classList.toggle('dark', useDark);
            }
        }

        // Execute initialization
        initializeTheme();
        document.addEventListener('DOMContentLoaded', initializeTheme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', initializeTheme);
    </script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">AdminDash</h1>
                <p class="auth-subtitle">Créer un nouveau compte</p>
            </div>

            <form id="signUpForm" class="auth-form">
                <div class="auth-form-group">
                    <label for="fullName">Nom complet</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Jean Dupont"
                        required
                    />
                    <span class="form-error" id="fullNameError"></span>
                </div>

                <div class="auth-form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="votre@email.com"
                        required
                    />
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="auth-form-group">
                    <label for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        />
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="passwordToggle"
                            aria-label="Afficher/Masquer le mot de passe"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="auth-form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="••••••••"
                            required
                        />
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="confirmPasswordToggle"
                            aria-label="Afficher/Masquer le mot de passe"
                        >
                            👁️
                        </button>
                    </div>
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn btn--primary auth-btn">S'inscrire</button>

                <span class="form-error" id="generalError"></span>
            </form>

            <div class="auth-footer">
                <p>Vous avez déjà un compte? <a href="/HTML/signin.html" class="auth-link">Se connecter</a></p>
            </div>
        </div>

        <div class="auth-background">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
            <div class="gradient-orb orb-3"></div>
        </div>
    </div>

    <script>
        // Sign Up Form Handler
        const signUpForm = document.getElementById('signUpForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordToggle = document.getElementById('passwordToggle');
        const confirmPasswordToggle = document.getElementById('confirmPasswordToggle');
        
        const fullNameError = document.getElementById('fullNameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const generalError = document.getElementById('generalError');
        const submitButton = signUpForm.querySelector('button[type="submit"]');

        passwordToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            passwordToggle.classList.toggle('active');
        });

        confirmPasswordToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            confirmPasswordToggle.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
            confirmPasswordToggle.classList.toggle('active');
        });

        signUpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            fullNameError.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            confirmPasswordError.textContent = '';
            generalError.textContent = '';

            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            let isValid = true;

            if (!fullName) {
                fullNameError.textContent = 'Le nom complet est requis';
                isValid = false;
            } else if (fullName.length < 3) {
                fullNameError.textContent = 'Le nom doit contenir au moins 3 caractères';
                isValid = false;
            }

            if (!email) {
                emailError.textContent = 'L\'email est requis';
                isValid = false;
            } else if (!isValidEmail(email)) {
                emailError.textContent = 'Email invalide';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Le mot de passe est requis';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                isValid = false;
            }

            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Veuillez confirmer le mot de passe';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Les mots de passe ne correspondent pas';
                isValid = false;
            }

            if (!isValid) return;

            try {
                submitButton.disabled = true;
                submitButton.textContent = 'Création...';

                const response = await window.auth.authRegister(fullName, email, password);
                window.auth.saveSession(response);
                window.auth.redirectToDashboard();
            } catch (error) {
                generalError.textContent = error.message || 'Impossible de créer le compte. Vérifiez les informations et réessayez.';
                submitButton.disabled = false;
                submitButton.textContent = 'S\'inscrire';
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
    </script>
</body>
</html>
